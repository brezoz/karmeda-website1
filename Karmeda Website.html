<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Karmeda · PT Karuna Metta Ananda — Konveksi Seragam Profesional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    @keyframes scroll-left {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* responsive */
    .promo-grid { /* responsive */ }
    @media (max-width: 768px) {
      .promo-grid { grid-template-columns: 1fr !important; padding: 28px !important; }
      .calc-notes { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 1024px) {
      .hero-split-grid, .about-grid, .calc-grid, .contact-grid, .measure-grid, .hero-cat-top {
        grid-template-columns: 1fr !important;
        gap: 48px !important;
      }
      .size-finder-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
      .products-grid, .blog-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .case-grid { grid-template-columns: 1fr !important; }
      .process-grid { grid-template-columns: 1fr !important; }
      .client-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .nav-links { display: none !important; }
      .testimonial { grid-template-columns: 1fr !important; }
      .hero-cat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 640px) {
      .products-grid, .blog-grid { grid-template-columns: 1fr !important; }
      .client-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .size-finder-results { grid-template-columns: 1fr !important; }
      :root { --gutter: 20px; }
      .section { padding: 64px 0 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/i18n.jsx"></script>
  <script type="text/babel" src="components/nav.jsx"></script>
  <script type="text/babel" src="components/hero.jsx"></script>
  <script type="text/babel" src="components/about.jsx"></script>
  <script type="text/babel" src="components/products.jsx"></script>
  <script type="text/babel" src="components/process.jsx"></script>
  <script type="text/babel" src="components/calculator.jsx"></script>
  <script type="text/babel" src="components/blog_faq.jsx"></script>
  <script type="text/babel" src="components/contact.jsx"></script>
  <script type="text/babel" src="components/app.jsx"></script>
</body>
</html>
