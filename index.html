  <link rel="icon" type="image/png" href="favicon.png"/>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css"/>
  
  <style>
    @keyframes scroll-left {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* Responsive */
    .promo-grid { /* responsive */ }
    @media (max-width: 768px) {
      .promo-grid { grid-template-columns: 1fr !important; padding: 28px !important; }
      .calc-notes { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 1024px) {
      .hero-split-grid, .about-grid, .calc-grid, .contact-grid, .measure-grid, .hero-cat-top {
        grid-template-columns: 1fr !important;
        gap: 48px !important;
      }
      .size-finder-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
      .products-grid, .blog-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .case-grid { grid-template-columns: 1fr !important; }
      .process-grid { grid-template-columns: 1fr !important; }
      .client-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .nav-links { display: none !important; }
      .testimonial { grid-template-columns: 1fr !important; }
      .hero-cat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 640px) {
      .products-grid, .blog-grid { grid-template-columns: 1fr !important; }
      .client-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .size-finder-results { grid-template-columns: 1fr !important; }
      :root { --gutter: 16px; }
      .section { padding: 64px 0 !important; }
      /* Hero photo — full width, no overflow */
      .hero-split-grid img {
        width: 100% !important;
        max-width: 100% !important;
        object-position: center center !important;
        border-radius: 12px !important;
      }
      /* Stats — 2x2 grid on mobile */
      .hero-stats-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 20px !important;
        margin-top: 36px !important;
      }
    }

    /* Prevent horizontal overflow globally */
    html, body { overflow-x: hidden !important; }
    #root { overflow-x: hidden; max-width: 100vw; }
    section, header, footer, nav { max-width: 100%; overflow-x: hidden; }

    /* Navbar mobile */
    .nav-cta-short { display: none; }
    @media (max-width: 480px) {
      .nav-sub-hide { display: none !important; }
      .nav-logo { height: 36px !important; width: 36px !important; }
      .nav-cta-full { display: none; }
      .nav-cta-short { display: inline; }
      .nav-cta { padding: 9px 12px !important; font-size: 12px !important; gap: 6px !important; }
      .brand-name { font-size: 13px !important; }
      .lang-toggle button { padding: 5px 9px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React Production Build - Faster & Smaller -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <!-- Components -->

  <script type="text/babel" src="components/nav.jsx"></script>

  <script type="text/babel" src="components/about.jsx"></script>
  <script type="text/babel" src="components/products.jsx"></script>

</body>
